services:
  digest:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: >
      sh -c "pip install -e . &&
             while true; do
               python -m tg_news_digest --config config.yaml;
               sleep 86400;
             done"
    restart: unless-stopped
